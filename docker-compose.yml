version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ak_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: auto_kontur
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: erp_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_user -d auto_kontur"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: autocontour-server:0.0.1
    container_name: ak_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: erp_user
      DB_PASSWORD: erp_password
      DB_NAME: auto_kontur
      JWT_SECRET: change-this-in-production-use-long-random-string
      SERVER_PORT: 8080
    ports:
      - "8087:8080"


volumes:
  postgres_data:
